<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store">
<title>BRS1 CPT Board</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0a0e1a;color:#e6edf3;min-height:100vh;overflow-x:hidden}
.header{background:linear-gradient(90deg,#0d1b2e 0%,#0a1628 100%);
        border-bottom:3px solid #f97316;padding:0 24px;height:70px;
        display:flex;align-items:center;justify-content:space-between;
        position:sticky;top:0;z-index:200}
.header-left{display:flex;align-items:center;gap:16px}
.amazon-logo{color:#f97316;font-size:24px;font-weight:900;font-style:italic}
.header-title{font-size:20px;font-weight:700}
.header-sub{font-size:12px;color:#8b949e;margin-top:2px}
.header-centre{flex:1;display:flex;flex-direction:column;align-items:center}
.clock{font-size:32px;font-weight:900;color:#f97316;font-variant-numeric:tabular-nums;line-height:1}
.date-lbl{font-size:12px;color:#8b949e;margin-top:2px}
.header-right{display:flex;align-items:center;gap:10px}
.next-pill{background:#1c2333;border:1px solid #374151;border-radius:20px;padding:6px 14px;
           display:flex;align-items:center;gap:10px}
.next-pill-label{font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:.05em}
.next-pill-time{font-size:16px;font-weight:700;color:#f97316}
.next-pill-cd{font-size:14px;font-weight:700;color:#fff;background:#374151;
              padding:2px 8px;border-radius:10px}
.next-pill.amber .next-pill-cd{background:#d97706;animation:flash 1s infinite}
.next-pill.red   .next-pill-cd{background:#dc2626;animation:flash .5s infinite}
.admin-btn{background:#1c2333;border:1px solid #374151;color:#8b949e;
           padding:8px 14px;border-radius:8px;font-size:13px;text-decoration:none}
.admin-btn:hover{border-color:#60a5fa;color:#60a5fa}
.controls{background:#111827;border-bottom:1px solid #1f2937;padding:12px 24px;
          position:sticky;top:70px;z-index:100}
.search-wrap{position:relative;display:inline-block;margin-bottom:10px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#6b7280}
.search-input{width:300px;background:#1c2333;border:1px solid #374151;border-radius:20px;
              color:#e6edf3;font-size:14px;padding:8px 16px 8px 36px;outline:none}
.search-input:focus{border-color:#f97316}
.tabs{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tab{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;
     border:1px solid #374151;background:#1c2333;color:#8b949e;
     display:flex;align-items:center;gap:6px;white-space:nowrap;transition:all .15s}
.tab.active{background:#f97316;border-color:#f97316;color:#fff}
.tab:hover:not(.active){border-color:#6b7280;color:#e6edf3}
.tab-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot-passed{background:#374151}
.dot-upcoming{background:#22c55e}
.dot-imminent{background:#f97316;animation:flash 1s infinite}
.dot-urgent{background:#dc2626;animation:flash .5s infinite}
.stats-bar{font-size:13px;color:#f97316;text-align:right;padding:4px 0 0}
.imminent-banner{display:none;padding:20px 24px;
                 align-items:center;justify-content:space-between}
.imminent-banner.amber{background:linear-gradient(90deg,#92400e,#78350f);
                       border-bottom:2px solid #d97706;display:flex}
.imminent-banner.red{background:linear-gradient(90deg,#7f1d1d,#6b1a1a);
                     border-bottom:2px solid #dc2626;display:flex;
                     animation:bannerFlash .8s infinite}
.banner-left{display:flex;align-items:center;gap:12px}
.banner-icon{font-size:28px}
.banner-title{font-size:22px;font-weight:900;letter-spacing:.05em}
.banner-sub{font-size:14px;opacity:.8;margin-top:2px}
.banner-cpt{font-size:72px;font-weight:900;font-variant-numeric:tabular-nums;
            color:#fff;text-shadow:0 0 30px rgba(255,255,255,.3)}
.banner-next{font-size:42px;font-weight:900;color:rgba(255,255,255,.6);font-variant-numeric:tabular-nums}
.jump-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
          color:#fff;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px;margin-top:8px;display:block}
.board{padding:20px 24px}
.cpt-section{margin-bottom:40px;scroll-margin-top:220px}
.cpt-section.passed{opacity:.35}
.section-header{display:flex;align-items:center;justify-content:space-between;
                margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #1f2937}
.section-time{font-size:32px;font-weight:900;font-variant-numeric:tabular-nums}
.section-time.passed{color:#374151}
.section-time.upcoming{color:#e6edf3}
.section-time.imminent{color:#f97316}
.section-time.urgent{color:#ef4444}
.section-meta{font-size:13px;color:#6b7280;margin-left:12px}
.section-cd{font-size:18px;font-weight:700}
.section-cd.passed{color:#374151}
.section-cd.upcoming{color:#8b949e}
.section-cd.imminent{color:#f97316}
.section-cd.urgent{color:#ef4444;animation:flash .5s infinite}
.carriers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.carrier-card{background:#111827;border:1px solid #1f2937;border-radius:12px;overflow:hidden}
.carrier-card-head{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
                   border-bottom:1px solid #1f2937}
.carrier-name{font-size:15px;font-weight:700}
.cn-regular{color:#22d3ee}.cn-sp{color:#a78bfa}.cn-inner{color:#fb923c}
.chutes-badge{font-size:12px;color:#6b7280;background:#1f2937;padding:2px 10px;border-radius:12px}
.col-headers{display:grid;grid-template-columns:1fr 1fr 50px 1fr;gap:8px;
             padding:6px 16px;background:#0d1117}
.col-hdr{font-size:10px;font-weight:700;color:#4b5563;text-transform:uppercase;letter-spacing:.07em}
.chute-row{display:grid;grid-template-columns:1fr 1fr 50px 1fr;gap:8px;
           padding:8px 16px;border-top:1px solid #0d1117;align-items:center}
.chute-row:hover{background:#161b22}
.chute-code{font-size:13px;font-weight:700;color:#e6edf3;background:#1f2937;
            padding:3px 8px;border-radius:5px;font-family:monospace}
.chute-sort{font-size:12px;color:#a78bfa}
.chute-bay{font-size:13px;font-weight:700;color:#fbbf24}
.chute-owner{font-size:13px;font-weight:600;color:#4ade80;font-style:italic}
.chute-owner.empty{color:#374151;font-weight:400}
.close-move{background:#3b1f08;border-top:1px solid #92400e;padding:8px 16px;
            font-size:12px;color:#fbbf24;display:flex;align-items:center;gap:8px}
#waiting{display:flex;flex-direction:column;align-items:center;justify-content:center;
         min-height:60vh;color:#6b7280;text-align:center;padding:40px}
.wait-icon{font-size:64px;margin-bottom:20px}
#pollStatus{font-size:12px;color:#4b5563;margin-top:12px}
@keyframes flash{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes bannerFlash{0%,100%{opacity:1}50%{opacity:.7}}
.debug-bar{position:fixed;bottom:0;left:0;right:0;background:#0d1117;color:#374151;
           font-size:10px;padding:3px 12px;z-index:999;font-family:monospace}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="amazon-logo">amazon</span>
    <div>
      <div class="header-title">&#128230; BRS1 CPT Assignment Board</div>
      <div class="header-sub">FC Shipping &mdash; Avonmouth, Bristol</div>
    </div>
  </div>
  <div class="header-centre">
    <div class="clock" id="clock">--:--:--</div>
    <div class="date-lbl" id="dateLbl"></div>
  </div>
  <div class="header-right">
    <div class="next-pill" id="nextPill">
      <div>
        <div class="next-pill-label">NEXT CPT</div>
        <div class="next-pill-time" id="nextPillTime">--:--</div>
      </div>
      <div class="next-pill-cd" id="nextPillCd">--</div>
    </div>
    <a class="admin-btn" href="index.html">&#9998; Admin</a>
  </div>
</div>

<div class="controls">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input class="search-input" id="searchInput" type="text" placeholder="Search name or login ID...">
    </div>
    <div class="stats-bar" id="statsBar"></div>
  </div>
  <div class="tabs" id="tabBar"></div>
</div>

<div class="imminent-banner" id="imminentBanner">
  <div class="banner-left">
    <span class="banner-icon" id="bannerIcon">&#9888;</span>
    <div>
      <div class="banner-title" id="bannerTitle">CPT IMMINENT</div>
      <div class="banner-sub" id="bannerSub"></div>
    </div>
  </div>
  <div class="banner-cpt" id="bannerCpt">--:--</div>
  <div>
    <div class="banner-next" id="bannerNext"></div>
    <button class="jump-btn" onclick="jumpToImminent()">&#8595; Jump to it</button>
  </div>
</div>

<div id="waiting">
  <div class="wait-icon">&#128225;</div>
  <div style="font-size:22px;font-weight:700;color:#9ca3af;margin-bottom:8px">Waiting for CPT data</div>
  <div style="font-size:14px;color:#6b7280">Publish assignments from the Admin page</div>
  <div id="pollStatus">Checking&hellip;</div>
</div>

<div class="board" id="board" style="display:none"></div>
<div class="debug-bar" id="debugBar">Loading&hellip;</div>

<script>
var DATA_RAW = "https://raw.githubusercontent.com/santojef/brs1-cpt/main/data.json";
var _lastTs = null;
var _allData = [];
var _activeTab = "all";
var _searchQ = "";
var _scrollInt = null;
var _scrollIdx = 0;

function dbg(m){document.getElementById("debugBar").textContent=new Date().toLocaleTimeString("en-GB")+" - "+m;}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function nowMins(){var n=new Date();return n.getHours()*60+n.getMinutes();}
function cptMins(t){
  if(!t)return 9999;
  var m=t.match(/(\d+):(\d+)/);
  if(!m)return 9999;
  var h=parseInt(m[1]),mn=parseInt(m[2]);
  return h*60+mn;
}
function minsUntil(t){return cptMins(t)-nowMins();}
function fmtCd(diff){
  if(diff<-1)return "passed";
  if(diff<=0)return "NOW";
  var h=Math.floor(diff/60),m=diff%60;
  return h>0?h+"h "+m+"m":m+"m";
}
function cptStatus(t){
  var diff=minsUntil(t);
  if(diff<-1)return "passed";
  if(diff<=10)return "urgent";
  if(diff<=15)return "imminent";
  return "upcoming";
}

function flatToGroups(data){
  var map={},order=[];
  data.forEach(function(row){
    var time=row.cpt||"",lane=row.carrier||"";
    var key=time+"|"+lane.toLowerCase().trim();
    if(!map[key]){map[key]={time:time,lane:lane,chutes:[]};order.push(key);}
    map[key].chutes.push({stacking:row.chute||"",sort:row.sort||"",bay:row.bay||"",owner:row.owner||""});
  });
  return order.map(function(k){return map[k];});
}

function getCPTTimes(groups){
  var times={};
  groups.forEach(function(g){times[g.time]=true;});
  return Object.keys(times).sort(function(a,b){
    var am=cptMins(a),bm=cptMins(b);
    if(am<480)am+=1440;
    if(bm<480)bm+=1440;
    return am-bm;
  });
}

function renderTabs(groups){
  var times=getCPTTimes(groups);
  var bar=document.getElementById("tabBar");
  bar.innerHTML="";
  var allTab=document.createElement("div");
  allTab.className="tab"+(_activeTab==="all"?" active":"");
  allTab.textContent="All CPTs";
  allTab.onclick=function(){_activeTab="all";renderBoard(_allData);};
  bar.appendChild(allTab);
  times.forEach(function(t){
    var st=cptStatus(t);
    var tab=document.createElement("div");
    tab.className="tab"+(_activeTab===t?" active":"");
    tab.innerHTML='<span class="tab-dot dot-'+st+'"></span>'+t;
    tab.onclick=(function(tt){return function(){_activeTab=tt;renderBoard(_allData);};})(t);
    bar.appendChild(tab);
  });
}

function renderBanner(groups){
  var banner=document.getElementById("imminentBanner");
  var times=getCPTTimes(groups);
  var urgent=null,imminent=null;
  times.forEach(function(t){
    var diff=minsUntil(t);
    if(diff>=-1&&diff<=10&&!urgent)urgent=t;
    else if(diff>10&&diff<=15&&!imminent)imminent=t;
  });
  var target=urgent||imminent;
  if(!target){banner.style.display="none";return;}
  var diff=minsUntil(target);
  var isUrgent=diff<=10;
  banner.className="imminent-banner "+(isUrgent?"red":"amber");
  banner.style.display="flex";
  document.getElementById("bannerTitle").textContent=isUrgent?"CPT URGENT":"CPT IMMINENT";
  document.getElementById("bannerIcon").textContent=isUrgent?"&#128308;":"&#9888;";
  document.getElementById("bannerCpt").textContent=target;
  var grps=groups.filter(function(g){return g.time===target;});
  var owners=new Set();
  grps.forEach(function(g){g.chutes.forEach(function(c){if(c.owner)owners.add(c.owner);});});
  document.getElementById("bannerSub").textContent=grps.length+" groups \u2022 "+owners.size+" associates";
  var next=times.find(function(t){return cptMins(t)>cptMins(target)&&minsUntil(t)>0;});
  document.getElementById("bannerNext").textContent=next?next:"";
}

function renderNextPill(groups){
  var times=getCPTTimes(groups);
  var next=times.find(function(t){return minsUntil(t)>=-1;});
  if(!next)return;
  var diff=minsUntil(next);
  document.getElementById("nextPillTime").textContent=next;
  document.getElementById("nextPillCd").textContent=diff<=0?"NOW":diff+"m";
  document.getElementById("nextPill").className="next-pill"+(diff<=10?" red":diff<=15?" amber":"");
}

function renderBoard(data){
  if(!data||!data.length)return;
  var groups=flatToGroups(data);
  renderTabs(groups);
  renderBanner(groups);
  renderNextPill(groups);
  var filtered=groups;
  if(_activeTab!=="all")filtered=groups.filter(function(g){return g.time===_activeTab;});
  if(_searchQ){
    var q=_searchQ.toLowerCase();
    filtered=filtered.filter(function(g){
      return g.chutes.some(function(c){
        return (c.owner||"").toLowerCase().indexOf(q)!==-1||(c.stacking||"").toLowerCase().indexOf(q)!==-1;
      });
    });
  }
  var chutes=filtered.reduce(function(s,g){return s+g.chutes.length;},0);
  var owners=new Set();
  filtered.forEach(function(g){g.chutes.forEach(function(c){if(c.owner)owners.add(c.owner);});});
  document.getElementById("statsBar").textContent=filtered.length+" groups \u2022 "+chutes+" chutes \u2022 "+owners.size+" associates";
  var cptMap={},cptOrder=[];
  filtered.forEach(function(g){
    if(!cptMap[g.time]){cptMap[g.time]=[];cptOrder.push(g.time);}
    cptMap[g.time].push(g);
  });
  var board=document.getElementById("board");
  board.innerHTML="";
  cptOrder.forEach(function(time){
    var carriers=cptMap[time];
    var diff=minsUntil(time);
    var st=cptStatus(time);
    var section=document.createElement("div");
    section.className="cpt-section"+(st==="passed"?" passed":"");
    section.id="cpt-"+time.replace(":","");
    var totalC=carriers.reduce(function(s,g){return s+g.chutes.length;},0);
    var ow=new Set();
    carriers.forEach(function(g){g.chutes.forEach(function(c){if(c.owner)ow.add(c.owner);});});
    section.innerHTML=
      '<div class="section-header">'+
        '<div style="display:flex;align-items:baseline;gap:12px">'+
          '<span class="section-time '+st+'">'+(time||"--:--")+'</span>'+
          '<span class="section-meta">'+carriers.length+' groups \u2022 '+totalC+' chutes \u2022 '+ow.size+' associates</span>'+
        '</div>'+
        '<span class="section-cd '+st+'">'+(diff<-1?"Passed":diff===0?"NOW":diff+"m")+"</span>"+
      '</div>'+
      '<div class="carriers-grid" id="cg-'+time.replace(":","")+"\"></div>";
    board.appendChild(section);
    var grid=section.querySelector(".carriers-grid");
    carriers.forEach(function(g){
      var ln=g.lane.toUpperCase();
      var nameCls=ln.indexOf("SP")!==-1||ln.indexOf("FLAT")!==-1?"cn-sp":
                  ln.indexOf("INNER")!==-1||ln.indexOf("BOX")!==-1?"cn-inner":"cn-regular";
      var hasClose=g.chutes.some(function(c){
        return (c.sort||"").toUpperCase().indexOf("CLOSE")!==-1||(c.stacking||"").toUpperCase().indexOf("CLOSE")!==-1;
      });
      var rows=g.chutes.map(function(c){
        var ocls=c.owner?"chute-owner":"chute-owner empty";
        return '<div class="chute-row">'+
          '<span class="chute-code">'+(esc(c.stacking)||"&mdash;")+'</span>'+
          '<span class="chute-sort">'+esc(c.sort)+'</span>'+
          '<span class="chute-bay">'+(c.bay||"&mdash;")+'</span>'+
          '<span class="'+ocls+'">'+esc(c.owner||"Unassigned")+'</span>'+
        '</div>';
      }).join("");
      var card=document.createElement("div");
      card.className="carrier-card";
      card.innerHTML=
        '<div class="carrier-card-head">'+
          '<span class="carrier-name '+nameCls+'">'+esc(g.lane)+'</span>'+
          '<span class="chutes-badge">'+g.chutes.length+' chutes</span>'+
        '</div>'+
        '<div class="col-headers">'+
          '<span class="col-hdr">CHUTE</span>'+
          '<span class="col-hdr">SORT</span>'+
          '<span class="col-hdr">BAY</span>'+
          '<span class="col-hdr">ASSOCIATE</span>'+
        '</div>'+
        rows+
        (hasClose?'<div class="close-move">&#9888; Close chute 10 min before CPT '+time+'</div>':"")+
      "";
      grid.appendChild(card);
    });
  });
  dbg("Rendered "+filtered.length+" groups tab="+_activeTab);
}

function jumpToImminent(){
  var t=document.getElementById("bannerCpt").textContent;
  var el=document.getElementById("cpt-"+t.replace(":",""));
  if(el)el.scrollIntoView({behavior:"smooth",block:"start"});
}

function startAutoScroll(){
  if(_scrollInt)clearInterval(_scrollInt);
  _scrollInt=setInterval(function(){
    var sections=Array.from(document.querySelectorAll(".cpt-section:not(.passed)"));
    if(!sections.length)return;
    _scrollIdx=(_scrollIdx+1)%sections.length;
    sections[_scrollIdx].scrollIntoView({behavior:"smooth",block:"start"});
  },8000);
}

function fetchData(cb){
  dbg("Fetching...");
  fetch(DATA_RAW+"?t="+Date.now(),{cache:"no-store"})
    .then(function(r){return r.text();})
    .then(function(t){var d=JSON.parse(t);cb(d&&d.ts?d:null);})
    .catch(function(e){dbg("ERROR: "+e.message);cb(null);});
}

function applyData(rec){
  if(!rec||!rec.ts||!rec.data||!rec.data.length)return;
  if(rec.ts===_lastTs){dbg("no change");return;}
  _lastTs=rec.ts;
  _allData=rec.data;
  document.getElementById("waiting").style.display="none";
  document.getElementById("board").style.display="block";
  renderBoard(_allData);
  startAutoScroll();
  dbg("Applied "+rec.data.length+" rows");
}

function poll(){
  fetchData(function(rec){
    if(rec){applyData(rec);}
    else{document.getElementById("pollStatus").textContent="Last checked: "+new Date().toLocaleTimeString("en-GB");}
  });
}
poll();
setInterval(poll,15000);
setInterval(function(){if(_allData.length)renderBoard(_allData);},30000);

document.getElementById("searchInput").addEventListener("input",function(e){
  _searchQ=e.target.value.trim();
  if(_allData.length)renderBoard(_allData);
});

function tick(){
  var n=new Date();
  document.getElementById("clock").textContent=n.toLocaleTimeString("en-GB");
  document.getElementById("dateLbl").textContent=n.toLocaleDateString("en-GB",
    {weekday:"long",day:"numeric",month:"long",year:"numeric"});
}
setInterval(tick,1000);tick();
dbg("TV v3 ready");
</script>
</body>
</html>
