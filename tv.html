<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store">
<title>BRS1 CPT Board</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}

/* Header */
.header{background:linear-gradient(135deg,#0d1117 0%,#1a1f2e 100%);
        border-bottom:3px solid #f97316;padding:16px 24px;
        display:flex;align-items:center;justify-content:space-between;
        position:sticky;top:0;z-index:100}
.logo{color:#f97316;font-size:22px;font-weight:900;font-style:italic;margin-right:16px}
.header-title{font-size:20px;font-weight:700;color:#e6edf3}
.header-sub{font-size:13px;color:#8b949e;margin-top:3px}
.updated{color:#4ade80}
.clock{font-size:28px;font-weight:700;color:#f97316;font-variant-numeric:tabular-nums}
.date{font-size:12px;color:#8b949e;margin-top:2px;text-align:right}

/* Waiting */
#waiting{display:flex;flex-direction:column;align-items:center;justify-content:center;
         min-height:70vh;color:#6b7280;text-align:center;padding:40px}
.wait-icon{font-size:64px;margin-bottom:20px}
.wait-title{font-size:24px;font-weight:700;color:#9ca3af;margin-bottom:8px}
.wait-sub{font-size:14px;color:#6b7280}
#pollStatus{font-size:12px;color:#4b5563;margin-top:12px}

/* Board */
#board{display:none;padding:20px}

/* CPT section */
.cpt-section{margin-bottom:32px}
.cpt-time-header{display:flex;align-items:center;gap:16px;margin-bottom:16px;
                 padding:12px 20px;background:#161b22;border-left:4px solid #f97316;
                 border-radius:0 8px 8px 0}
.cpt-time{font-size:28px;font-weight:900;color:#f97316;font-variant-numeric:tabular-nums}
.cpt-countdown{font-size:14px;color:#8b949e;margin-left:auto}
.cpt-passed .cpt-time{color:#374151}
.cpt-passed .cpt-time-header{border-left-color:#374151;opacity:0.5}

/* Carriers grid */
.carriers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}

/* Carrier card */
.carrier-card{background:#161b22;border:1px solid #30363d;border-radius:10px;overflow:hidden}
.carrier-card-head{background:#1c2333;padding:10px 14px;border-bottom:1px solid #30363d;
                   display:flex;align-items:center;justify-content:space-between}
.carrier-name{font-size:14px;font-weight:700;color:#60a5fa}
.carrier-bay{font-size:12px;color:#fbbf24;background:#1a1500;padding:2px 8px;border-radius:12px}

/* Chute rows */
.chute-row{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid #1f2937;gap:10px}
.chute-row:last-child{border-bottom:none}
.chute-code{font-size:13px;font-weight:600;color:#e6edf3;min-width:100px}
.chute-sort{font-size:11px;color:#a78bfa;flex:1}
.chute-owner{font-size:13px;font-weight:600;color:#4ade80;text-align:right}
.chute-owner.empty{color:#374151;font-weight:400;font-style:italic}

/* Debug */
.debug-bar{position:fixed;bottom:0;left:0;right:0;background:#1c2333;color:#93c5fd;
           font-size:11px;padding:4px 12px;z-index:999;font-family:monospace;
           border-top:1px solid #30363d}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center">
    <span class="logo">amazon</span>
    <div>
      <div class="header-title">&#128230; BRS1 CPT Assignment Board</div>
      <div class="header-sub">FC Shipping &mdash; Avonmouth, Bristol &nbsp;&bull;&nbsp;
        <span class="updated" id="lastUp">Loading&hellip;</span></div>
    </div>
  </div>
  <div>
    <div class="clock" id="clock">--:--:--</div>
    <div class="date" id="dateLbl"></div>
  </div>
</div>

<div id="waiting">
  <div class="wait-icon">&#128225;</div>
  <div class="wait-title">Waiting for CPT data</div>
  <div class="wait-sub">Publish assignments from the Admin page</div>
  <div id="pollStatus">Checking&hellip;</div>
</div>

<div id="board"></div>
<div class="debug-bar" id="debugBar">Initialising&hellip;</div>

<script>
var DATA_RAW = 'https://raw.githubusercontent.com/santojef/brs1-cpt/main/data.json';
var _lastTs  = null;

function dbg(msg){
  document.getElementById('debugBar').textContent =
    new Date().toLocaleTimeString('en-GB') + ' — ' + msg;
  console.log('[TV]', msg);
}

/* ── Time helpers ── */
function nowMins(){var n=new Date();return n.getHours()*60+n.getMinutes();}
function cptMins(t){
  if(!t)return 9999;
  var m=t.match(/(\d+):(\d+)/);
  if(!m)return 9999;
  return parseInt(m[1])*60+parseInt(m[2]);
}
function countdown(t){
  var diff=cptMins(t)-nowMins();
  if(diff<0)return 'passed';
  if(diff===0)return 'NOW';
  var h=Math.floor(diff/60),m=diff%60;
  return h>0?h+'h '+m+'m':m+'m';
}

/* ── Render ── */
function renderBoard(data){
  var board=document.getElementById('board');
  board.innerHTML='';

  // Group by CPT time
  var groupMap={},groupOrder=[];
  data.forEach(function(row){
    var time=row.cpt||'';
    var lane=row.carrier||'';
    var gKey=time+'|'+lane.toLowerCase().trim();
    if(!groupMap[gKey]){
      groupMap[gKey]={time:time,lane:lane,chutes:[]};
      groupOrder.push(gKey);
    }
    groupMap[gKey].chutes.push({
      stacking:row.chute||'',
      sort:row.sort||'',
      bay:row.bay||'',
      owner:row.owner||''
    });
  });
  var groups=groupOrder.map(function(k){return groupMap[k];});

  // Group by CPT time for sections
  var cptMap={},cptOrder=[];
  groups.forEach(function(g){
    if(!cptMap[g.time]){cptMap[g.time]=[];cptOrder.push(g.time);}
    cptMap[g.time].push(g);
  });

  var nm=nowMins();
  cptOrder.forEach(function(time){
    var carriers=cptMap[time];
    var cm=cptMins(time);
    var passed=cm<nm-10;
    var cd=countdown(time);

    var section=document.createElement('div');
    section.className='cpt-section'+(passed?' cpt-passed':'');

    var cdHtml='';
    if(cd==='passed'){cdHtml='<span style="color:#374151">Passed</span>';}
    else if(cd==='NOW'){cdHtml='<span style="color:#ef4444;font-weight:700;font-size:16px">&#9679; NOW</span>';}
    else{cdHtml='<span style="color:#8b949e">in '+cd+'</span>';}

    section.innerHTML=
      '<div class="cpt-time-header">'+
        '<span class="cpt-time">'+time+'</span>'+
        '<div class="cpt-countdown">'+cdHtml+'</div>'+
      '</div>'+
      '<div class="carriers-grid" id="cg-'+time.replace(':','')+'"></div>';
    board.appendChild(section);

    var grid=section.querySelector('.carriers-grid');
    carriers.forEach(function(g){
      var chuteRows=g.chutes.map(function(c){
        var ownerClass=c.owner?'chute-owner':'chute-owner empty';
        var ownerText=c.owner||'Unassigned';
        return '<div class="chute-row">'+
          '<span class="chute-code">'+esc(c.stacking)+'</span>'+
          '<span class="chute-sort">'+esc(c.sort)+'</span>'+
          '<span class="'+ownerClass+'">'+esc(ownerText)+'</span>'+
        '</div>';
      }).join('');

      // Bay from first chute that has one
      var bay='';
      g.chutes.forEach(function(c){if(!bay&&c.bay)bay=c.bay;});

      var card=document.createElement('div');
      card.className='carrier-card';
      card.innerHTML=
        '<div class="carrier-card-head">'+
          '<span class="carrier-name">'+esc(g.lane)+'</span>'+
          (bay?'<span class="carrier-bay">Bay '+esc(bay)+'</span>':'')+
        '</div>'+
        chuteRows;
      grid.appendChild(card);
    });
  });

  dbg('Rendered '+groups.length+' groups across '+cptOrder.length+' CPT times');
}

function esc(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Fetch ── */
function fetchData(cb){
  dbg('Fetching data.json...');
  fetch(DATA_RAW+'?t='+Date.now(),{cache:'no-store'})
    .then(function(r){
      dbg('HTTP '+r.status);
      return r.text();
    })
    .then(function(text){
      var d=JSON.parse(text);
      dbg('Parsed: ts='+d.ts+' rows='+(d.data||[]).length);
      cb(d&&d.ts?d:null);
    })
    .catch(function(e){
      dbg('ERROR: '+e.message);
      cb(null);
    });
}

function applyData(rec){
  if(!rec||!rec.ts||!rec.data||!rec.data.length) return;
  if(rec.ts===_lastTs){dbg('No change');return;}
  _lastTs=rec.ts;
  document.getElementById('waiting').style.display='none';
  document.getElementById('board').style.display='block';
  renderBoard(rec.data);
  document.getElementById('lastUp').textContent='Updated: '+rec.ts;
}

function poll(){
  fetchData(function(rec){
    if(rec){applyData(rec);}
    else{
      document.getElementById('pollStatus').textContent=
        'Last checked: '+new Date().toLocaleTimeString('en-GB');
    }
  });
}

poll();
setInterval(poll,15000);

// Refresh countdown every minute
setInterval(function(){
  if(_lastTs) renderBoard(JSON._lastData||(function(){return[];})());
},60000);

/* ── Clock ── */
function tick(){
  var n=new Date();
  document.getElementById('clock').textContent=n.toLocaleTimeString('en-GB');
  document.getElementById('dateLbl').textContent=n.toLocaleDateString('en-GB',
    {weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
setInterval(tick,1000);tick();

dbg('TV page loaded. Polling every 15s.');
</script>
</body>
</html>
