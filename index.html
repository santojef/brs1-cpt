<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRS1 CPT Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}

/* ── Top bar ── */
.topbar{background:#161b22;border-bottom:2px solid #f97316;padding:0 20px;
        display:flex;align-items:center;justify-content:space-between;
        height:56px;position:sticky;top:0;z-index:200}
.topbar h1{color:#f97316;font-size:18px;font-weight:700}
.topbar .sub{color:#8b949e;font-size:11px;margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:10px}
.btn{padding:8px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.btn-orange{background:#f97316;color:#fff}.btn-orange:hover{background:#ea6a00}
.btn-blue{background:#1c2333;color:#60a5fa;border:1px solid #374151}.btn-blue:hover{border-color:#60a5fa}
.btn-green{background:#065f46;color:#4ade80;border:1px solid #16a34a}.btn-green:hover{background:#047857}
.btn:disabled{background:#374151;color:#6b7280;cursor:default}

/* ── Status ── */
.status{padding:8px 20px;font-size:13px;font-weight:500;display:none}
.status.ok {background:#052e16;color:#4ade80;display:block}
.status.err{background:#2a0505;color:#f87171;display:block}
.status.inf{background:#1e3a5f;color:#93c5fd;display:block}

/* ── Tab bar ── */
.tabs{display:flex;gap:4px;padding:12px 20px 0;background:#0d1117;
      border-bottom:1px solid #21262d;overflow-x:auto;align-items:center}
.tab{padding:8px 18px;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;
     cursor:pointer;border:1px solid transparent;border-bottom:none;white-space:nowrap;
     background:#161b22;color:#8b949e}
.tab.active{background:#1c2333;color:#f97316;border-color:#30363d}
.tab:hover:not(.active){color:#e6edf3}
.tab-add{padding:7px 14px;border-radius:8px 8px 0 0;font-size:18px;cursor:pointer;
         color:#4b5563;background:none;border:1px dashed #374151;border-bottom:none}
.tab-add:hover{color:#f97316;border-color:#f97316}

/* ── Sheet content ── */
.sheet{display:none;padding:20px}
.sheet.active{display:block}

/* ── Sheet toolbar ── */
.sheet-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.sheet-name-input{background:#161b22;border:1px solid #374151;border-radius:6px;
                  color:#f97316;font-size:16px;font-weight:700;padding:6px 12px;width:180px}
.sheet-name-input:focus{outline:none;border-color:#f97316}

/* ── Carrier blocks ── */
.carrier-block{background:#161b22;border:1px solid #30363d;border-radius:10px;
               margin-bottom:16px;overflow:hidden}
.carrier-head{background:#1c2333;padding:10px 16px;display:flex;align-items:center;
              gap:10px;border-bottom:1px solid #30363d}
.carrier-name-input{background:#0d1117;border:1px solid #374151;border-radius:6px;
                    color:#60a5fa;font-size:14px;font-weight:700;padding:5px 12px;width:260px}
.carrier-name-input:focus{outline:none;border-color:#60a5fa}
.carrier-head-right{margin-left:auto;display:flex;gap:8px;align-items:center}

/* ── Spreadsheet table ── */
.cpt-table{width:100%;border-collapse:collapse}
.cpt-table th{background:#0d1117;color:#6b7280;font-size:11px;font-weight:600;
              text-transform:uppercase;letter-spacing:.05em;padding:6px 8px;
              border:1px solid #21262d;text-align:left;white-space:nowrap}
.cpt-table td{padding:2px 3px;border:1px solid #21262d}
.cpt-table tr:hover td{background:#161b22}
.cell{background:transparent;border:none;color:#e6edf3;font-size:13px;
      padding:5px 8px;width:100%;min-width:80px}
.cell:focus{outline:2px solid #f97316;border-radius:3px;background:#0d1117}
.cell.owner{color:#4ade80}
.cell.bay{color:#fbbf24;width:60px;min-width:50px}
.cell.sort{color:#a78bfa;min-width:70px}
.del-row-btn{background:none;border:none;color:#374151;cursor:pointer;font-size:16px;
             padding:4px 8px;width:100%}
.del-row-btn:hover{color:#f87171}

/* ── Add row btn ── */
.add-row-row td{padding:4px 8px;border:1px solid #21262d}
.add-row-btn{background:none;border:none;color:#4b5563;cursor:pointer;font-size:12px;
             padding:4px 12px;width:100%;text-align:left}
.add-row-btn:hover{color:#f97316}

/* ── Add carrier btn ── */
.add-carrier-btn{background:none;border:2px dashed #374151;color:#6b7280;
                 padding:10px 20px;border-radius:8px;cursor:pointer;font-size:13px;
                 width:100%;margin-top:4px}
.add-carrier-btn:hover{border-color:#60a5fa;color:#60a5fa}

/* ── Add sheet btn ── */
.add-sheet-btn{background:none;border:2px dashed #374151;color:#6b7280;
               padding:14px;border-radius:10px;cursor:pointer;font-size:14px;
               width:100%;margin-top:8px}
.add-sheet-btn:hover{border-color:#f97316;color:#f97316}

/* ── Import banner ── */
.import-banner{background:#1c2333;border:1px solid #30363d;border-radius:10px;
               padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px}
.import-banner p{color:#8b949e;font-size:13px;flex:1}
#fileIn{display:none}

/* ── Icon btns ── */
.icon-btn{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:4px;
          color:#6b7280;font-size:15px}
.icon-btn:hover{color:#e6edf3;background:#21262d}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div>
    <h1>&#128230; BRS1 CPT Admin</h1>
    <div class="sub">Edit assignments &mdash; publish to all TV screens instantly</div>
  </div>
  <div class="topbar-right">
    <button class="btn btn-blue" onclick="document.getElementById('fileIn').click()">&#128196; Import Excel</button>
    <input type="file" id="fileIn" accept=".xlsx,.xls,.csv">
    <a class="btn btn-blue" href="tv.html" target="_blank">&#128250; TV Preview</a>
    <button class="btn btn-green" id="publishBtn" onclick="publishAll()">&#9989; Publish to TVs</button>
  </div>
</div>
<div class="status" id="status"></div>

<!-- TAB BAR -->
<div class="tabs" id="tabBar">
  <button class="tab-add" onclick="addSheet()" title="Add CPT window">+</button>
</div>

<!-- SHEETS -->
<div id="sheetsContainer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
var BLOB_URL = 'https://jsonblob.com/api/jsonBlob/019f1048-c5f0-759a-a997-7d10111d135d';

// ── Data model ─────────────────────────────────────────────────────────────
// sheets = [ { name:'2030-2130', carriers:[ { name:'DPD', rows:[{lane,chute,sort,bay,owner},...] } ] } ]
var sheets = [];
var activeSheet = 0;

// ── Render all ──────────────────────────────────────────────────────────────
function render() {
  renderTabs();
  renderSheets();
}

function renderTabs() {
  var bar = document.getElementById('tabBar');
  // Keep + button, replace rest
  var addBtn = bar.querySelector('.tab-add');
  bar.innerHTML = '';
  sheets.forEach(function(sh, si) {
    var t = document.createElement('div');
    t.className = 'tab' + (si===activeSheet?' active':'');
    t.textContent = sh.name || 'CPT '+(si+1);
    t.onclick = function(){ activeSheet=si; render(); };
    bar.appendChild(t);
  });
  bar.appendChild(addBtn);
}

function renderSheets() {
  var container = document.getElementById('sheetsContainer');
  container.innerHTML = '';
  sheets.forEach(function(sh, si) {
    var div = document.createElement('div');
    div.className = 'sheet' + (si===activeSheet?' active':'');
    div.id = 'sheet-'+si;

    // Sheet toolbar
    div.innerHTML =
      '<div class="sheet-toolbar">' +
        '<input class="sheet-name-input" value="'+esc(sh.name)+'" placeholder="e.g. 2030-2130" ' +
               'title="CPT window name" oninput="sheets['+si+'].name=this.value;renderTabs()">' +
        '<button class="btn btn-blue" onclick="addCarrier('+si+')">+ Add Carrier</button>' +
        '<button class="icon-btn" onclick="dupSheet('+si+')" title="Duplicate sheet">&#128386;</button>' +
        (sheets.length>1?'<button class="icon-btn" onclick="delSheet('+si+')" title="Delete sheet" style="color:#f87171">&#128465;</button>':'')+
      '</div>';

    // Carriers
    sh.carriers.forEach(function(car, ki) {
      var rows_html = car.rows.map(function(row, ri) {
        return '<tr>' +
          '<td><input class="cell" value="'+esc(row.lane)+'" placeholder="Lane" ' +
               'oninput="sheets['+si+'].carriers['+ki+'].rows['+ri+'].lane=this.value"></td>' +
          '<td><input class="cell" value="'+esc(row.chute)+'" placeholder="e.g. BOX-C-01A" ' +
               'oninput="sheets['+si+'].carriers['+ki+'].rows['+ri+'].chute=this.value"></td>' +
          '<td><input class="cell sort" value="'+esc(row.sort)+'" placeholder="Sort code" ' +
               'oninput="sheets['+si+'].carriers['+ki+'].rows['+ri+'].sort=this.value"></td>' +
          '<td><input class="cell bay" value="'+esc(row.bay)+'" placeholder="Bay" ' +
               'oninput="sheets['+si+'].carriers['+ki+'].rows['+ri+'].bay=this.value"></td>' +
          '<td><input class="cell owner" value="'+esc(row.owner)+'" placeholder="Owner name" ' +
               'oninput="sheets['+si+'].carriers['+ki+'].rows['+ri+'].owner=this.value"></td>' +
          '<td style="width:36px"><button class="del-row-btn" onclick="delRow('+si+','+ki+','+ri+')">&#215;</button></td>' +
        '</tr>';
      }).join('');

      var cb = document.createElement('div');
      cb.className = 'carrier-block';
      cb.innerHTML =
        '<div class="carrier-head">' +
          '<span style="color:#8b949e;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em">CARRIER / ROUTE</span>' +
          '<input class="carrier-name-input" value="'+esc(car.name)+'" placeholder="e.g. DPD, NORTHAMP, DME4-ND" ' +
                 'oninput="sheets['+si+'].carriers['+ki+'].name=this.value">' +
          '<div class="carrier-head-right">' +
            '<button class="icon-btn" onclick="dupCarrier('+si+','+ki+')" title="Duplicate carrier">&#128386;</button>' +
            '<button class="icon-btn" onclick="delCarrier('+si+','+ki+')" title="Remove carrier" style="color:#f87171">&#215;</button>' +
          '</div>' +
        '</div>' +
        '<table class="cpt-table">' +
          '<thead><tr><th>Lane</th><th>Stacking / Chute</th><th>Sort</th><th>Bay</th><th>Owner</th><th></th></tr></thead>' +
          '<tbody>' + rows_html +
            '<tr class="add-row-row"><td colspan="6">' +
              '<button class="add-row-btn" onclick="addRow('+si+','+ki+')">+ Add row</button>' +
            '</td></tr>' +
          '</tbody>' +
        '</table>';
      div.appendChild(cb);
    });

    // Add carrier button
    var addCarBtn = document.createElement('button');
    addCarBtn.className = 'add-carrier-btn';
    addCarBtn.textContent = '+ Add Carrier / Route';
    addCarBtn.onclick = (function(s){ return function(){ addCarrier(s); }; })(si);
    div.appendChild(addCarBtn);

    container.appendChild(div);
  });
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// ── Mutations ────────────────────────────────────────────────────────────────
function addSheet() {
  sheets.push({name:'New CPT',carriers:[{name:'',rows:[{lane:'',chute:'',sort:'',bay:'',owner:''}]}]});
  activeSheet = sheets.length-1; render();
}
function delSheet(si) {
  if(!confirm('Delete this CPT window?')) return;
  sheets.splice(si,1);
  if(activeSheet>=sheets.length) activeSheet=sheets.length-1;
  render();
}
function dupSheet(si) {
  var copy = JSON.parse(JSON.stringify(sheets[si]));
  copy.name = copy.name + ' (copy)';
  sheets.splice(si+1,0,copy);
  activeSheet=si+1; render();
}
function addCarrier(si) {
  sheets[si].carriers.push({name:'',rows:[{lane:'',chute:'',sort:'',bay:'',owner:''}]});
  render();
}
function delCarrier(si,ki) {
  if(sheets[si].carriers.length===1&&!confirm('Remove last carrier?')) return;
  sheets[si].carriers.splice(ki,1); render();
}
function dupCarrier(si,ki) {
  var copy = JSON.parse(JSON.stringify(sheets[si].carriers[ki]));
  copy.name = copy.name+' (copy)';
  sheets[si].carriers.splice(ki+1,0,copy); render();
}
function addRow(si,ki) {
  sheets[si].carriers[ki].rows.push({lane:'',chute:'',sort:'',bay:'',owner:''});
  render();
}
function delRow(si,ki,ri) {
  sheets[si].carriers[ki].rows.splice(ri,1);
  if(!sheets[si].carriers[ki].rows.length)
    sheets[si].carriers[ki].rows.push({lane:'',chute:'',sort:'',bay:'',owner:''});
  render();
}

// ── Flatten to data array ────────────────────────────────────────────────────
function flatten() {
  var out=[];
  sheets.forEach(function(sh) {
    sh.carriers.forEach(function(car) {
      car.rows.forEach(function(row) {
        if(!row.chute&&!row.owner&&!row.lane) return;
        out.push({
          sheet:   sh.name,
          cpt:     extractCPT(sh.name),
          carrier: row.lane||car.name,
          chute:   row.chute,
          sort:    row.sort,
          bay:     row.bay,
          owner:   row.owner
        });
      });
    });
  });
  return out;
}

function extractCPT(name) {
  // "2030-2130" -> "20:30"
  var m = (name||'').match(/(\d{3,4})/);
  if(!m) return name;
  var t = m[1].length===3?'0'+m[1]:m[1];
  return t.slice(0,2)+':'+t.slice(2);
}

// ── Publish ──────────────────────────────────────────────────────────────────
function publishAll() {
  var data = flatten();
  if(!data.length){showStatus('Nothing to publish — add some assignments first.','err');return;}
  var btn = document.getElementById('publishBtn');
  btn.disabled=true; btn.textContent='Publishing...';
  showStatus('Publishing '+data.length+' assignments...','inf');

  fetch(BLOB_URL,{
    method:'PUT',
    headers:{'Content-Type':'application/json','Accept':'application/json'},
    body: JSON.stringify({ts:new Date().toLocaleString('en-GB'),data:data,rosterMap:{}})
  })
  .then(function(r){return r.json();})
  .then(function(d){
    btn.disabled=false; btn.textContent='\u2705 Publish to TVs';
    if(d.ts){showStatus('\u2713 Published '+data.length+' rows \u2014 TVs update within 15 seconds','ok');}
    else{showStatus('Error: '+JSON.stringify(d).substring(0,120),'err');}
  })
  .catch(function(e){
    btn.disabled=false; btn.textContent='\u2705 Publish to TVs';
    showStatus('Error: '+e.message,'err');
  });
}

function showStatus(msg,cls){
  var el=document.getElementById('status');
  el.textContent=msg; el.className='status '+cls;
  if(cls==='ok') setTimeout(function(){el.style.display='none';},6000);
}

// ── Excel import ─────────────────────────────────────────────────────────────
document.getElementById('fileIn').addEventListener('change',function(e){
  if(!e.target.files[0]) return;
  showStatus('Reading Excel file...','inf');
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
      importWorkbook(wb);
    }catch(err){showStatus('Read error: '+err.message,'err');}
  };
  reader.readAsArrayBuffer(e.target.files[0]);
});

var SKIP=['roster','bags','bags sun'];
function importWorkbook(wb){
  var newSheets=[];
  wb.SheetNames.forEach(function(sn){
    if(SKIP.indexOf(sn.toLowerCase().trim())!==-1) return;
    if(sn.trim()[0]===' ') return;
    var carriers=parseSheet(wb.Sheets[sn]);
    if(carriers.length) newSheets.push({name:sn,carriers:carriers});
  });
  if(!newSheets.length){showStatus('No CPT data found in Excel file.','err');return;}
  sheets=newSheets; activeSheet=0; render();
  showStatus('Imported '+newSheets.length+' CPT windows from Excel. Review then click Publish.','inf');
}

function parseSheet(ws){
  var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
  var carriers=[]; var currentCar=null;
  for(var ri=0;ri<rows.length;ri++){
    var row=rows[ri].map(function(c){return String(c||'').trim();});
    var a=row[0]||'';
    // Skip CPT time header rows, instruction rows
    if(a.match(/^\d{3,4}\s+CPT/i)||a.match(/^SP\s+CPT/i)||!row.some(function(c){return c!=='';})) continue;
    if(row.some(function(c){return c.length>40;})) continue;
    // Carrier header
    var cm=a.match(/^\d{3,4}\s+BRS1\s*[-\u2013>]+\s*(.+)/i);
    if(cm){currentCar={name:cm[1].trim(),rows:[]};carriers.push(currentCar);continue;}
    // Column header row
    if(row.some(function(c){return c.toLowerCase()==='lane';})) continue;
    // Data rows — scan across in groups of 6
    for(var ci=0;ci<row.length;ci+=6){
      var lane=row[ci]||'',chute=row[ci+1]||'',sort=row[ci+2]||'',bay=row[ci+3]||'',owner=row[ci+4]||'';
      if(!chute&&!lane) continue;
      if(chute==='Stacking'||chute==='Sort'||chute==='Owner') continue;
      bay=bay.replace(/\.0+$/,'');
      // If lane looks like a carrier header, create new carrier group
      if(lane&&lane!==((currentCar&&currentCar.name)||'')){
        // Check if this lane is already a carrier name
        var found=null;
        carriers.forEach(function(c){if(c.name===lane)found=c;});
        if(!found){currentCar={name:lane,rows:[]};carriers.push(currentCar);}
        else{currentCar=found;}
      }
      if(!currentCar){currentCar={name:lane||'Unknown',rows:[]};carriers.push(currentCar);}
      currentCar.rows.push({lane:lane,chute:chute,sort:sort,bay:bay,owner:owner});
    }
  }
  // Remove empty carriers
  return carriers.filter(function(c){return c.rows.some(function(r){return r.chute||r.owner;});});
}

// ── Load existing from jsonblob ───────────────────────────────────────────────
function loadExisting(){
  fetch(BLOB_URL+'?t='+Date.now(),{cache:'no-store',headers:{'Accept':'application/json'}})
  .then(function(r){return r.json();})
  .then(function(d){
    if(!d||!d.data||!d.data.length){addSheet();render();return;}
    // Rebuild sheets from flat data
    var sheetMap={},sheetOrder=[];
    d.data.forEach(function(row){
      var sk=row.sheet||row.cpt||'CPT';
      if(!sheetMap[sk]){sheetMap[sk]={};sheetOrder.push(sk);}
      var ck=row.carrier||'';
      if(!sheetMap[sk][ck])sheetMap[sk][ck]=[];
      sheetMap[sk][ck].push({lane:row.carrier||'',chute:row.chute||'',sort:row.sort||'',bay:row.bay||'',owner:row.owner||''});
    });
    sheets=sheetOrder.map(function(sk){
      return{name:sk,carriers:Object.keys(sheetMap[sk]).map(function(k){
        return{name:k,rows:sheetMap[sk][k]};
      })};
    });
    render();
    showStatus('Loaded existing data ('+d.data.length+' rows) \u2014 last saved: '+d.ts,'inf');
  })
  .catch(function(){addSheet();render();});
}
