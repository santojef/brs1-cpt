<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRS1 CPT Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
.topbar{background:#161b22;border-bottom:2px solid #f97316;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:200}
.topbar h1{color:#f97316;font-size:18px;font-weight:700}
.topbar .sub{color:#8b949e;font-size:11px;margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:10px}
.btn{padding:8px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.btn-orange{background:#f97316;color:#fff}.btn-orange:hover{background:#ea6a00}
.btn-blue{background:#1c2333;color:#60a5fa;border:1px solid #374151}.btn-blue:hover{border-color:#60a5fa}
.btn-green{background:#065f46;color:#4ade80;border:1px solid #16a34a}.btn-green:hover{background:#047857}
.btn:disabled{background:#374151;color:#6b7280;cursor:default}
.status{padding:8px 20px;font-size:13px;font-weight:500;display:none}
.status.ok{background:#052e16;color:#4ade80;display:block}
.status.err{background:#2a0505;color:#f87171;display:block}
.status.inf{background:#1e3a5f;color:#93c5fd;display:block}
.tabs{display:flex;gap:4px;padding:12px 20px 0;background:#0d1117;border-bottom:1px solid #21262d;overflow-x:auto;align-items:center}
.tab{padding:8px 18px;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;border-bottom:none;white-space:nowrap;background:#161b22;color:#8b949e}
.tab.active{background:#1c2333;color:#f97316;border-color:#30363d}
.tab:hover:not(.active){color:#e6edf3}
.tab-add{padding:7px 14px;border-radius:8px 8px 0 0;font-size:18px;cursor:pointer;color:#4b5563;background:none;border:1px dashed #374151;border-bottom:none}
.tab-add:hover{color:#f97316;border-color:#f97316}
.sheet{display:none;padding:20px}.sheet.active{display:block}
.sheet-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.sheet-name-input{background:#161b22;border:1px solid #374151;border-radius:6px;color:#f97316;font-size:16px;font-weight:700;padding:6px 12px;width:180px}
.sheet-name-input:focus{outline:none;border-color:#f97316}
.carrier-block{background:#161b22;border:1px solid #30363d;border-radius:10px;margin-bottom:16px;overflow:hidden}
.carrier-head{background:#1c2333;padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #30363d}
.carrier-name-input{background:#0d1117;border:1px solid #374151;border-radius:6px;color:#60a5fa;font-size:14px;font-weight:700;padding:5px 12px;width:260px}
.carrier-name-input:focus{outline:none;border-color:#60a5fa}
.carrier-head-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.cpt-table{width:100%;border-collapse:collapse}
.cpt-table th{background:#0d1117;color:#6b7280;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:6px 8px;border:1px solid #21262d;text-align:left;white-space:nowrap}
.cpt-table td{padding:2px 3px;border:1px solid #21262d}
.cpt-table tr:hover td{background:#161b22}
.cell{background:transparent;border:none;color:#e6edf3;font-size:13px;padding:5px 8px;width:100%;min-width:80px}
.cell:focus{outline:2px solid #f97316;border-radius:3px;background:#0d1117}
.cell.owner{color:#4ade80}.cell.bay{color:#fbbf24;width:60px;min-width:50px}.cell.sort{color:#a78bfa;min-width:70px}
.del-row-btn{background:none;border:none;color:#374151;cursor:pointer;font-size:16px;padding:4px 8px;width:100%}
.del-row-btn:hover{color:#f87171}
.add-row-btn{background:none;border:none;color:#4b5563;cursor:pointer;font-size:12px;padding:4px 12px;width:100%;text-align:left}
.add-row-btn:hover{color:#f97316}
.add-carrier-btn{background:none;border:2px dashed #374151;color:#6b7280;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:13px;width:100%;margin-top:4px}
.add-carrier-btn:hover{border-color:#60a5fa;color:#60a5fa}
.add-cpt-btn{background:#161b22;border:2px dashed #374151;color:#6b7280;padding:14px;border-radius:10px;cursor:pointer;font-size:14px;width:100%;margin-top:8px}
.add-cpt-btn:hover{border-color:#f97316;color:#f97316}
.icon-btn{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:4px;color:#6b7280;font-size:15px}
.icon-btn:hover{color:#e6edf3;background:#21262d}
#fileIn{display:none}
</style>
</head>
<body>
<div class="topbar">
  <div><h1>&#128230; BRS1 CPT Admin</h1><div class="sub">Edit assignments &mdash; publish to all TV screens instantly</div></div>
  <div class="topbar-right">
    <button class="btn btn-blue" onclick="document.getElementById('fileIn').click()">&#128196; Import Excel</button>
    <input type="file" id="fileIn" accept=".xlsx,.xls,.csv">
    <a class="btn btn-blue" href="tv.html" target="_blank">&#128250; TV Preview</a>
    <button class="btn btn-green" id="publishBtn" onclick="publishAll()">&#9989; Publish to TVs</button>
  </div>
</div>
<div class="status" id="status"></div>
<div id="tokenSetup" style="display:none;background:#1c2333;border:1px solid #f97316;
     border-radius:8px;padding:16px 20px;margin:12px 20px;align-items:center;gap:12px;flex-wrap:wrap">
  <span style="color:#f97316;font-weight:600;font-size:13px">&#128273; GitHub Token required to Publish</span>
  <input id="tokenInput" type="password" placeholder="ghp_..." style="flex:1;min-width:260px;
    background:#0d1117;border:1px solid #374151;border-radius:6px;color:#e6edf3;
    font-size:13px;padding:8px 12px" />
  <button onclick="saveToken()" style="background:#f97316;color:#fff;border:none;
    padding:8px 18px;border-radius:6px;font-weight:600;cursor:pointer">Save Token</button>
  <a href="https://github.com/settings/tokens/new?description=brs1-cpt&scopes=repo"
     target="_blank" style="color:#60a5fa;font-size:12px">Get token &#8599;</a>
</div>

<div class="tabs" id="tabBar"><button class="tab-add" onclick="addSheet()" title="Add CPT window">+</button></div>
<div id="sheetsContainer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
var GH_TOKEN = localStorage.getItem('gh_token') || '';
var GH_USER   = 'santojef';
var GH_REPO   = 'brs1-cpt';
var DATA_RAW  = 'https://raw.githubusercontent.com/santojef/brs1-cpt/main/data.json';
var DATA_API  = '/repos/santojef/brs1-cpt/contents/data.json';
var sheets = [];
var activeSheet = 0;

function render(){renderTabs();renderSheets();}

function renderTabs(){
  var bar=document.getElementById('tabBar');
  var addBtn=bar.querySelector('.tab-add');
  bar.innerHTML='';
  sheets.forEach(function(sh,si){
    var t=document.createElement('div');
    t.className='tab'+(si===activeSheet?' active':'');
    t.textContent=sh.name||'CPT '+(si+1);
    t.onclick=function(){activeSheet=si;render();};
    bar.appendChild(t);
  });
  bar.appendChild(addBtn);
}

function renderSheets(){
  var container=document.getElementById('sheetsContainer');
  container.innerHTML='';
  sheets.forEach(function(sh,si){
    var div=document.createElement('div');
    div.className='sheet'+(si===activeSheet?' active':'');
    div.innerHTML=
      '<div class="sheet-toolbar">'+
        '<input class="sheet-name-input" value="'+esc(sh.name)+'" placeholder="e.g. 2030-2130" '+
               'oninput="sheets['+si+'].name=this.value;renderTabs()">'+
        '<button class="btn btn-blue" onclick="addCarrier('+si+')">+ Add Carrier</button>'+
        '<button class="icon-btn" onclick="dupSheet('+si+')" title="Duplicate">&#128386;</button>'+
        (sheets.length>1?'<button class="icon-btn" onclick="delSheet('+si+')" title="Delete" style="color:#f87171">&#128465;</button>':'')+
      '</div>';
    sh.carriers.forEach(function(car,ki){
      var rows_html=car.rows.map(function(row,ri){
        return '<tr>'+
          '<td><input class="cell" value="'+esc(row.lane)+'" placeholder="" oninput="sheets['+si+'].carriers['+ki+'].rows['+ri+'].lane=this.value"></td>'+
          '<td><input class="cell" value="'+esc(row.chute)+'" placeholder="BOX-C-01A" oninput="sheets['+si+'].carriers['+ki+'].rows['+ri+'].chute=this.value"></td>'+
          '<td><input class="cell sort" value="'+esc(row.sort)+'" placeholder="" oninput="sheets['+si+'].carriers['+ki+'].rows['+ri+'].sort=this.value"></td>'+
          '<td><input class="cell bay" value="'+esc(row.bay)+'" placeholder="" oninput="sheets['+si+'].carriers['+ki+'].rows['+ri+'].bay=this.value"></td>'+
          '<td><input class="cell owner" value="'+esc(row.owner)+'" placeholder="Name" oninput="sheets['+si+'].carriers['+ki+'].rows['+ri+'].owner=this.value"></td>'+
          '<td style="width:36px"><button class="del-row-btn" onclick="delRow('+si+','+ki+','+ri+')">&#215;</button></td>'+
        '</tr>';
      }).join('');
      var cb=document.createElement('div');
      cb.className='carrier-block';
      cb.innerHTML=
        '<div class="carrier-head">'+
          '<span style="color:#8b949e;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em">CARRIER / ROUTE</span>'+
          '<input class="carrier-name-input" value="'+esc(car.name)+'" placeholder="e.g. DPD, NORTHAMP" oninput="sheets['+si+'].carriers['+ki+'].name=this.value">'+
          '<div class="carrier-head-right">'+
            '<button class="icon-btn" onclick="dupCarrier('+si+','+ki+')" title="Duplicate">&#128386;</button>'+
            '<button class="icon-btn" onclick="delCarrier('+si+','+ki+')" title="Remove" style="color:#f87171">&#215;</button>'+
          '</div>'+
        '</div>'+
        '<table class="cpt-table"><thead><tr><th>Lane</th><th>Stacking / Chute</th><th>Sort</th><th>Bay</th><th>Owner</th><th></th></tr></thead>'+
        '<tbody>'+rows_html+
          '<tr><td colspan="6"><button class="add-row-btn" onclick="addRow('+si+','+ki+')">+ Add row</button></td></tr>'+
        '</tbody></table>';
      div.appendChild(cb);
    });
    var acb=document.createElement('button');
    acb.className='add-carrier-btn';acb.textContent='+ Add Carrier / Route';
    acb.onclick=(function(s){return function(){addCarrier(s);};})(si);
    div.appendChild(acb);
    container.appendChild(div);
  });
}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function addSheet(){sheets.push({name:'New CPT',carriers:[{name:'',rows:[{lane:'',chute:'',sort:'',bay:'',owner:''}]}]});activeSheet=sheets.length-1;render();}
function delSheet(si){if(!confirm('Delete?'))return;sheets.splice(si,1);if(activeSheet>=sheets.length)activeSheet=sheets.length-1;render();}
function dupSheet(si){var c=JSON.parse(JSON.stringify(sheets[si]));c.name+=' (copy)';sheets.splice(si+1,0,c);activeSheet=si+1;render();}
function addCarrier(si){sheets[si].carriers.push({name:'',rows:[{lane:'',chute:'',sort:'',bay:'',owner:''}]});render();}
function delCarrier(si,ki){sheets[si].carriers.splice(ki,1);render();}
function dupCarrier(si,ki){var c=JSON.parse(JSON.stringify(sheets[si].carriers[ki]));c.name+=' (copy)';sheets[si].carriers.splice(ki+1,0,c);render();}
function addRow(si,ki){sheets[si].carriers[ki].rows.push({lane:'',chute:'',sort:'',bay:'',owner:''});render();}
function delRow(si,ki,ri){sheets[si].carriers[ki].rows.splice(ri,1);if(!sheets[si].carriers[ki].rows.length)sheets[si].carriers[ki].rows.push({lane:'',chute:'',sort:'',bay:'',owner:''});render();}

function flatten(){
  var out=[];
  sheets.forEach(function(sh){
    sh.carriers.forEach(function(car){
      car.rows.forEach(function(row){
        if(!row.chute&&!row.owner&&!row.lane)return;
        var m=(sh.name||'').match(/(\d{3,4})/);
        var t=m?m[1].padStart(4,'0'):'0000';
        out.push({sheet:sh.name,cpt:t.slice(0,2)+':'+t.slice(2),carrier:row.lane||car.name,chute:row.chute,sort:row.sort,bay:row.bay,owner:row.owner});
      });
    });
  });
  return out;
}

function publishAll(){
  var data=flatten();
  if(!data.length){showStatus('Nothing to publish.','err');return;}
  var btn=document.getElementById('publishBtn');
  btn.disabled=true;btn.textContent='Publishing...';
  showStatus('Publishing '+data.length+' assignments...','inf');

  var payload=JSON.stringify({ts:new Date().toLocaleString('en-GB'),data:data,sheets:sheets,rosterMap:{}});

  // Get current SHA then push
  fetch('https://api.github.com'+DATA_API,{
    headers:{'Authorization':'token '+GH_TOKEN,'Accept':'application/vnd.github.v3+json','User-Agent':'brs1-cpt'}
  })
  .then(function(r){return r.json();})
  .then(function(d){
    var sha=d.sha||null;
    var encoded=btoa(unescape(encodeURIComponent(payload)));
    var body={message:'Update CPT data',content:encoded,branch:'main'};
    if(sha)body.sha=sha;
    return fetch('https://api.github.com'+DATA_API,{
      method:'PUT',
      headers:{'Authorization':'token '+GH_TOKEN,'Accept':'application/vnd.github.v3+json',
               'Content-Type':'application/json','User-Agent':'brs1-cpt'},
      body:JSON.stringify(body)
    });
  })
  .then(function(r){return r.json();})
  .then(function(d){
    btn.disabled=false;btn.textContent='✅ Publish to TVs';
    if(d.content){
      showStatus('✓ Published '+data.length+' rows — TVs update within 15 seconds','ok');
    }else{
      showStatus('Error: '+JSON.stringify(d).substring(0,120),'err');
    }
  })
  .catch(function(e){btn.disabled=false;btn.textContent='✅ Publish to TVs';showStatus('Error: '+e.message,'err');});
}

function showStatus(msg,cls){
  var el=document.getElementById('status');
  el.textContent=msg;el.className='status '+cls;
  if(cls==='ok')setTimeout(function(){el.style.display='none';},6000);
}

/* ── Import Excel ── */
document.getElementById('fileIn').addEventListener('change',function(e){
  if(!e.target.files[0])return;
  showStatus('Reading Excel...','inf');
  var reader=new FileReader();
  reader.onload=function(ev){
    try{var wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});importWB(wb);}
    catch(err){showStatus('Read error: '+err.message,'err');}
  };
  reader.readAsArrayBuffer(e.target.files[0]);
});

var SKIP_SH=['roster','bags','bags sun'];
function importWB(wb){
  var ns=[];
  wb.SheetNames.forEach(function(sn){
    if(SKIP_SH.indexOf(sn.toLowerCase().trim())!==-1)return;
    if(sn.trim()[0]===' ')return;
    var cars=parseSheet(wb.Sheets[sn]);
    if(cars.length)ns.push({name:sn,carriers:cars});
  });
  if(!ns.length){showStatus('No CPT data found.','err');return;}
  sheets=ns;activeSheet=0;render();
  showStatus('Imported '+ns.length+' CPT windows. Review then Publish.','inf');
}

function parseSheet(ws){
  var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
  var carriers=[];var current=null;
  var BAD=['Lane','Stacking','Sort','Bay','Owner',''];
  for(var ri=0;ri<rows.length;ri++){
    var row=rows[ri].map(function(c){return String(c||'').trim();});
    var a=row[0]||'';
    if(!row.some(function(c){return c!=='';}))continue;
    if(row.some(function(c){return c.length>50;}))continue;
    if(a.match(/^\d{3,4}\s*CPT/i)||a.match(/^SP\s+CPT/i))continue;
    if(row.some(function(c){return c.toLowerCase()==='lane';}))continue;
    var cm=a.match(/^\d{3,4}\s+BRS1\s*[-–>]+\s*(.+)/i);
    if(cm){current={name:cm[1].trim(),rows:[]};carriers.push(current);continue;}
    for(var ci=0;ci<row.length;ci+=6){
      var lane=row[ci]||'',chute=row[ci+1]||'',sort=row[ci+2]||'',bay=row[ci+3]||'',owner=row[ci+4]||'';
      if(!chute||BAD.indexOf(chute)!==-1)continue;
      if(lane&&BAD.indexOf(lane)===-1){
        var found=null;carriers.forEach(function(c){if(c.name===lane)found=c;});
        if(found){current=found;}else{current={name:lane,rows:[]};carriers.push(current);}
      }
      if(!current){current={name:lane||'Unknown',rows:[]};carriers.push(current);}
      current.rows.push({
        lane:  BAD.indexOf(lane)===-1?lane:'',
        chute: chute,
        sort:  BAD.indexOf(sort)===-1?sort:'',
        bay:   BAD.indexOf(bay)===-1?bay:'',
        owner: BAD.indexOf(owner)===-1?owner:''
      });
    }
  }
  return carriers.filter(function(c){return c.rows.some(function(r){return r.chute||r.owner;});});
}

/* ── Load existing ── */
function loadExisting(){
  fetch(DATA_RAW+'?t='+Date.now(),{cache:'no-store'})
  .then(function(r){return r.json();})
  .then(function(d){
    if(d&&d.sheets&&d.sheets.length){
      sheets=d.sheets;activeSheet=0;render();
      showStatus('Loaded: '+d.ts+' ('+d.data.length+' rows)','inf');
    }else{addSheet();render();}
  })
  .catch(function(){addSheet();render();});
}

function saveToken(){
  var t=document.getElementById('tokenInput').value.trim();
  if(!t){alert('Please enter a token');return;}
  localStorage.setItem('gh_token',t);
  GH_TOKEN=t;
  document.getElementById('tokenSetup').style.display='none';
  showStatus('Token saved. Click Publish to TVs.','ok');
}
function checkToken(){
  if(!localStorage.getItem('gh_token')){
    document.getElementById('tokenSetup').style.display='flex';
  }
}

loadExisting();
checkToken();
</script>
</body>
</html>
