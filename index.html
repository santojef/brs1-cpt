<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRS1 CPT Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
.topbar{background:#161b22;border-bottom:2px solid #f97316;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:200}
.topbar h1{color:#f97316;font-size:18px;font-weight:700}
.topbar .sub{color:#8b949e;font-size:11px;margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:10px}
.btn{padding:8px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.btn-blue{background:#1c2333;color:#60a5fa;border:1px solid #374151}.btn-blue:hover{border-color:#60a5fa}
.btn-green{background:#065f46;color:#4ade80;border:1px solid #16a34a}.btn-green:hover{background:#047857}
.btn:disabled{background:#374151;color:#6b7280;cursor:default}
.status{padding:8px 20px;font-size:13px;font-weight:500;display:none}
.status.ok{background:#052e16;color:#4ade80;display:block}
.status.err{background:#2a0505;color:#f87171;display:block}
.status.inf{background:#1e3a5f;color:#93c5fd;display:block}
.tabs{display:flex;gap:4px;padding:12px 20px 0;background:#0d1117;border-bottom:1px solid #21262d;overflow-x:auto;align-items:center}
.tab{padding:8px 18px;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;border-bottom:none;white-space:nowrap;background:#161b22;color:#8b949e}
.tab.active{background:#1c2333;color:#f97316;border-color:#30363d}
.tab:hover:not(.active){color:#e6edf3}
.tab-add{padding:7px 14px;border-radius:8px 8px 0 0;font-size:18px;cursor:pointer;color:#4b5563;background:none;border:1px dashed #374151;border-bottom:none}
.tab-add:hover{color:#f97316;border-color:#f97316}
.sheet{display:none;padding:20px}.sheet.active{display:block}
.sheet-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.sheet-name-input{background:#161b22;border:1px solid #374151;border-radius:6px;color:#f97316;font-size:16px;font-weight:700;padding:6px 12px;width:180px}
.sheet-name-input:focus{outline:none;border-color:#f97316}
.carrier-block{background:#161b22;border:1px solid #30363d;border-radius:10px;margin-bottom:16px;overflow:hidden}
.carrier-head{background:#1c2333;padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #30363d}
.carrier-name-input{background:#0d1117;border:1px solid #374151;border-radius:6px;color:#60a5fa;font-size:14px;font-weight:700;padding:5px 12px;width:260px}
.carrier-name-input:focus{outline:none;border-color:#60a5fa}
.carrier-head-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.cpt-table{width:100%;border-collapse:collapse}
.cpt-table th{background:#0d1117;color:#6b7280;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:6px 8px;border:1px solid #21262d;text-align:left;white-space:nowrap}
.cpt-table td{padding:2px 3px;border:1px solid #21262d}
.cpt-table tr:hover td{background:#161b22}
.cell{background:transparent;border:none;color:#e6edf3;font-size:13px;padding:5px 8px;width:100%;min-width:80px}
.cell:focus{outline:2px solid #f97316;border-radius:3px;background:#0d1117}
.cell.owner{color:#4ade80}.cell.bay{color:#fbbf24;width:60px;min-width:50px}.cell.sort{color:#a78bfa;min-width:70px}
.del-row-btn{background:none;border:none;color:#374151;cursor:pointer;font-size:16px;padding:4px 8px;width:100%}
.del-row-btn:hover{color:#f87171}
.add-row-btn{background:none;border:none;color:#4b5563;cursor:pointer;font-size:12px;padding:4px 12px;width:100%;text-align:left}
.add-row-btn:hover{color:#f97316}
.add-carrier-btn{background:none;border:2px dashed #374151;color:#6b7280;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:13px;width:100%;margin-top:4px}
.add-carrier-btn:hover{border-color:#60a5fa;color:#60a5fa}
.icon-btn{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:4px;color:#6b7280;font-size:15px}
.icon-btn:hover{color:#e6edf3;background:#21262d}
#fileIn{display:none}
</style>
</head>
<body>
<div class="topbar">
  <div><h1>&#128230; BRS1 CPT Admin</h1><div class="sub">Edit assignments &mdash; publish to all TV screens instantly</div></div>
  <div class="topbar-right">
    <button class="btn btn-blue" id="importBtn">&#128196; Import Excel</button>
    <input type="file" id="fileIn" accept=".xlsx,.xls,.csv">
    <a class="btn btn-blue" href="tv.html" target="_blank">&#128250; TV Preview</a>
    <button class="btn btn-green" id="publishBtn">&#9989; Publish to TVs</button>
  </div>
</div>
<div class="status" id="status"></div>
<div id="tokenSetup" style="display:none;background:#1c2333;border:1px solid #f97316;
     border-radius:8px;padding:16px 20px;margin:12px 20px;align-items:center;gap:12px;flex-wrap:wrap">
  <span style="color:#f97316;font-weight:600;font-size:13px">&#128273; GitHub Token required to Publish</span>
  <input id="tokenInput" type="password" placeholder="ghp_..." style="flex:1;min-width:260px;
    background:#0d1117;border:1px solid #374151;border-radius:6px;color:#e6edf3;font-size:13px;padding:8px 12px"/>
  <button id="saveTokenBtn" style="background:#f97316;color:#fff;border:none;padding:8px 18px;border-radius:6px;font-weight:600;cursor:pointer">Save Token</button>
  <a href="https://github.com/settings/tokens/new?description=brs1-cpt&scopes=repo" target="_blank" style="color:#60a5fa;font-size:12px">Get token &#8599;</a>
</div>
<div class="tabs" id="tabBar"><button class="tab-add" id="addSheetBtn" title="Add CPT window">+</button></div>
<div id="sheetsContainer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
var GH_TOKEN = localStorage.getItem('gh_token') || '';
var DATA_RAW = 'https://raw.githubusercontent.com/santojef/brs1-cpt/main/data.json';
var DATA_API = '/repos/santojef/brs1-cpt/contents/data.json';
var sheets = [];
var activeSheet = 0;

/* ── Wire up buttons (no inline onclick) ── */
document.getElementById('importBtn').addEventListener('click', function(){ document.getElementById('fileIn').click(); });
document.getElementById('fileIn').addEventListener('change', function(e){ if(e.target.files[0]) handleFile(e.target.files[0]); });
document.getElementById('publishBtn').addEventListener('click', publishAll);
document.getElementById('addSheetBtn').addEventListener('click', addSheet);
document.getElementById('saveTokenBtn').addEventListener('click', saveToken);

/* ── Render ── */
function render(){ renderTabs(); renderSheets(); }

function renderTabs(){
  var bar = document.getElementById('tabBar');
  var addBtn = document.getElementById('addSheetBtn');
  bar.innerHTML = '';
  sheets.forEach(function(sh, si){
    var t = document.createElement('div');
    t.className = 'tab' + (si === activeSheet ? ' active' : '');
    t.textContent = sh.name || ('CPT ' + (si+1));
    t.addEventListener('click', (function(i){ return function(){ activeSheet=i; render(); }; })(si));
    bar.appendChild(t);
  });
  bar.appendChild(addBtn);
}

function renderSheets(){
  var container = document.getElementById('sheetsContainer');
  container.innerHTML = '';
  sheets.forEach(function(sh, si){
    var div = document.createElement('div');
    div.className = 'sheet' + (si === activeSheet ? ' active' : '');

    var toolbar = document.createElement('div');
    toolbar.className = 'sheet-toolbar';
    var nameIn = document.createElement('input');
    nameIn.className = 'sheet-name-input';
    nameIn.value = sh.name || '';
    nameIn.placeholder = 'e.g. 2030-2130';
    nameIn.addEventListener('input', (function(i){ return function(){ sheets[i].name = this.value; renderTabs(); }; })(si));
    toolbar.appendChild(nameIn);

    var addCarBtn = document.createElement('button');
    addCarBtn.className = 'btn btn-blue';
    addCarBtn.textContent = '+ Add Carrier';
    addCarBtn.addEventListener('click', (function(i){ return function(){ addCarrier(i); }; })(si));
    toolbar.appendChild(addCarBtn);

    if(sheets.length > 1){
      var delBtn = document.createElement('button');
      delBtn.className = 'icon-btn';
      delBtn.innerHTML = '&#128465;';
      delBtn.style.color = '#f87171';
      delBtn.title = 'Delete sheet';
      delBtn.addEventListener('click', (function(i){ return function(){ delSheet(i); }; })(si));
      toolbar.appendChild(delBtn);
    }
    div.appendChild(toolbar);

    sh.carriers.forEach(function(car, ki){
      var cb = document.createElement('div');
      cb.className = 'carrier-block';

      var head = document.createElement('div');
      head.className = 'carrier-head';
      var label = document.createElement('span');
      label.style.cssText = 'color:#8b949e;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em';
      label.textContent = 'CARRIER / ROUTE';
      head.appendChild(label);
      var nameInp = document.createElement('input');
      nameInp.className = 'carrier-name-input';
      nameInp.value = car.name || '';
      nameInp.placeholder = 'e.g. DPD, STN8';
      nameInp.addEventListener('input', (function(s,k){ return function(){ sheets[s].carriers[k].name = this.value; }; })(si,ki));
      head.appendChild(nameInp);
      var hr = document.createElement('div');
      hr.className = 'carrier-head-right';
      var delCarBtn = document.createElement('button');
      delCarBtn.className = 'icon-btn';
      delCarBtn.innerHTML = '&#215;';
      delCarBtn.style.color = '#f87171';
      delCarBtn.addEventListener('click', (function(s,k){ return function(){ delCarrier(s,k); }; })(si,ki));
      hr.appendChild(delCarBtn);
      head.appendChild(hr);
      cb.appendChild(head);

      var tbl = document.createElement('table');
      tbl.className = 'cpt-table';
      tbl.innerHTML = '<thead><tr><th>CPT</th><th>Lane</th><th>Chute</th><th>Sort</th><th>Bay</th><th>Owner</th><th></th></tr></thead>';
      var tbody = document.createElement('tbody');
      car.rows.forEach(function(row, ri){
        var tr = document.createElement('tr');
        [
          {key:'cptTime', cls:'sort',   ph:'e.g. 01:30'},
          {key:'lane',    cls:'',       ph:''},
          {key:'chute',   cls:'',       ph:'BOX-A-01'},
          {key:'sort',    cls:'sort',   ph:''},
          {key:'bay',     cls:'bay',    ph:''},
          {key:'owner',   cls:'owner',  ph:'Name'}
        ].forEach(function(col){
          var td = document.createElement('td');
          var inp = document.createElement('input');
          inp.className = 'cell ' + col.cls;
          inp.value = row[col.key] || '';
          inp.placeholder = col.ph;
          inp.addEventListener('input', (function(s,k,r,key){ return function(){ sheets[s].carriers[k].rows[r][key] = this.value; }; })(si,ki,ri,col.key));
          td.appendChild(inp);
          tr.appendChild(td);
        });
        var tdDel = document.createElement('td');
        tdDel.style.width = '36px';
        var delBtn = document.createElement('button');
        delBtn.className = 'del-row-btn';
        delBtn.innerHTML = '&#215;';
        delBtn.addEventListener('click', (function(s,k,r){ return function(){ delRow(s,k,r); }; })(si,ki,ri));
        tdDel.appendChild(delBtn);
        tr.appendChild(tdDel);
        tbody.appendChild(tr);
      });
      var trAdd = document.createElement('tr');
      var tdAdd = document.createElement('td');
      tdAdd.colSpan = 7;
      var addRowBtn = document.createElement('button');
      addRowBtn.className = 'add-row-btn';
      addRowBtn.textContent = '+ Add row';
      addRowBtn.addEventListener('click', (function(s,k){ return function(){ addRow(s,k); }; })(si,ki));
      tdAdd.appendChild(addRowBtn);
      trAdd.appendChild(tdAdd);
      tbody.appendChild(trAdd);
      tbl.appendChild(tbody);
      cb.appendChild(tbl);
      div.appendChild(cb);
    });

    var acb = document.createElement('button');
    acb.className = 'add-carrier-btn';
    acb.textContent = '+ Add Carrier / Route';
    acb.addEventListener('click', (function(i){ return function(){ addCarrier(i); }; })(si));
    div.appendChild(acb);
    container.appendChild(div);
  });
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function addSheet(){ sheets.push({name:'New CPT',carriers:[{name:'',cptTime:'',rows:[{cptTime:'',lane:'',chute:'',sort:'',bay:'',owner:''}]}]}); activeSheet=sheets.length-1; render(); }
function delSheet(si){ if(!confirm('Delete?'))return; sheets.splice(si,1); if(activeSheet>=sheets.length)activeSheet=sheets.length-1; render(); }
function addCarrier(si){ sheets[si].carriers.push({name:'',cptTime:'',rows:[{cptTime:'',lane:'',chute:'',sort:'',bay:'',owner:''}]}); render(); }
function delCarrier(si,ki){ sheets[si].carriers.splice(ki,1); render(); }
function addRow(si,ki){ sheets[si].carriers[ki].rows.push({cptTime:'',lane:'',chute:'',sort:'',bay:'',owner:''}); render(); }
function delRow(si,ki,ri){ sheets[si].carriers[ki].rows.splice(ri,1); if(!sheets[si].carriers[ki].rows.length) sheets[si].carriers[ki].rows.push({cptTime:'',lane:'',chute:'',sort:'',bay:'',owner:''}); render(); }

/* ── Flatten for publish ── */
function fmtT(raw){
  if(!raw)return'';
  raw=String(raw).trim().replace(/\s+/g,'');
  if(/^\d{1,2}:\d{2}$/.test(raw))return raw.length===4?'0'+raw:raw;
  raw=raw.replace(/:/g,'').padStart(4,'0');
  return raw.slice(0,2)+':'+raw.slice(2);
}

function flatten(){
  var out=[];
  sheets.forEach(function(sh){
    var fallbackM=(sh.name||'').match(/(\d{3,4})/);
    var fallbackT=fallbackM?fmtT(fallbackM[1]):'';
    sh.carriers.forEach(function(car){
      car.rows.forEach(function(row){
        if(!row.chute&&!row.owner&&!row.lane)return;
        var t=row.cptTime||car.cptTime||fallbackT;
        if(t)out.push({sheet:sh.name,cpt:t,carrier:row.lane||car.name,chute:row.chute||'',sort:row.sort||'',bay:row.bay||'',owner:row.owner||''});
      });
    });
  });
  return out;
}

/* ── Import Excel ── */
function handleFile(file){
  showStatus('Reading Excel...','inf');
  var reader = new FileReader();
  reader.onload = function(ev){
    try{
      var wb = XLSX.read(new Uint8Array(ev.target.result), {type:'array'});
      importWB(wb);
    } catch(err){
      showStatus('Read error: ' + err.message, 'err');
    }
  };
  reader.onerror = function(){ showStatus('Could not read file.','err'); };
  reader.readAsArrayBuffer(file);
}

var SKIP_SH = ['roster','bags','bags sun',' bags'];

function importWB(wb){
  var ns = [];
  wb.SheetNames.forEach(function(sn){
    if(SKIP_SH.indexOf(sn.toLowerCase().trim()) !== -1) return;
    var cars = parseSheet(wb.Sheets[sn]);
    if(cars.length) ns.push({name:sn, carriers:cars});
  });
  if(!ns.length){ showStatus('No CPT data found in file.','err'); return; }
  sheets = ns; activeSheet = 0; render();
  var total = ns.reduce(function(s,sh){ return s + sh.carriers.reduce(function(a,c){ return a+c.rows.length; },0); },0);
  var times = [...new Set(flatten().map(function(r){return r.cpt;}))].sort();
  showStatus('Imported ' + ns.length + ' sheets, ' + total + ' rows. CPTs: ' + times.join(', ') + ' — review then Publish.','inf');
}

function parseSheet(ws){
  var raw = XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
  var rows = raw.map(function(r){ return r.map(function(c){ return String(c||'').trim(); }); });
  var BAD = ['Lane','Stacking','Sort','Bay','Owner','None','','ContainerType','Container Type'];

  function isBad(s){ return !s || BAD.map(function(b){return b.toLowerCase();}).indexOf(s.toLowerCase())!==-1 || s.length>80; }
  function isCptHdr(s){ return /CPT|start\s*@/i.test(s) && /\d{1,2}:\d{2}/.test(s); }
  function isCarHdr(s){ return /^BRS1/i.test(s.trim()); }
  function parseCptTime(s){
    var m=s.match(/(\d{1,2}:\d{2})\s*CPT/i); if(m) return m[1].replace(/^(\d):/, '0$1:');
    m=s.match(/(\d{1,2}:\d{2})\s*PT\b/i);    if(m) return m[1].replace(/^(\d):/, '0$1:');
    var ts=s.match(/\d{1,2}:\d{2}/g);
    if(ts){ var t=ts[ts.length-1]; return t.replace(/^(\d):/,'0$1:'); }
    return null;
  }
  function parseCarName(s){ var m=s.match(/^BRS1[->\s]+(.+)/i); return m?m[1].trim().replace(/^-/,'').trim():s.trim(); }

  // ── Detect shift type from content ──────────────────────────────────────
  // Night shift: cells like "2030 BRS1->CARRIER"
  // Day shift:   cells like "Start @ 09:45 - 10:00 CPT" / "BRS1-CARRIER-SAME-DAY"
  var isNight = false;
  for(var ri=0; ri<rows.length && !isNight; ri++){
    for(var ci=0; ci<rows[ri].length && !isNight; ci++){
      if(/^\d{3,4}\s+BRS1/i.test(rows[ri][ci])) isNight=true;
    }
  }

  var blocks = [];
  var seenBlk = {};

  if(isNight){
    // ── Night shift parser (existing logic) ────────────────────────────────
    for(var ri=0; ri<rows.length; ri++){
      var row=rows[ri];
      for(var ci=0; ci<row.length; ci++){
        var cell=row[ci]; if(!cell) continue;
        if(/^\d{3,4}\s*CPT\s*$/i.test(cell)) continue;
        var spM=cell.match(/^SP\s+CPT\s+(\d{3,4})\s*$/i);
        if(spM){ blocks.push({ri:ri,ci:ci,name:'SP',cpt:fmtT(spM[1])}); continue; }
        var carM=cell.match(/^(\d{3,4})\s+BRS1\s*[-\u2013>]*\s*(.+)/i);
        if(carM){ blocks.push({ri:ri,ci:ci,name:carM[2].trim(),cpt:fmtT(carM[1])}); }
      }
    }
  } else {
    // ── Day shift parser ───────────────────────────────────────────────────
    for(var ri=0; ri<rows.length; ri++){
      var row=rows[ri];
      for(var ci_=0; ci_<row.length; ci_++){
        var ci=ci_; // keep in scope
        if([0,6,12,18].indexOf(ci)===-1) continue;
        var cell=row[ci]; if(!cell) continue;
        var key=ri+','+ci;
        if(seenBlk[key]) continue;
        if(isCptHdr(cell)){
          var cpt=parseCptTime(cell); if(!cpt) continue;
          var carrier='';
          if(ri+1<rows.length && ci<rows[ri+1].length){
            var cr=rows[ri+1][ci];
            if(cr && isCarHdr(cr)) carrier=parseCarName(cr);
          }
          var ds=ri+2;
          if(ds<rows.length){
            var hv=rows[ds].map(function(v){return v.toLowerCase();});
            if(hv.indexOf('lane')!==-1||hv.indexOf('stacking')!==-1) ds++;
          }
          seenBlk[key]=true;
          blocks.push({ri:ri,ci:ci,cpt:cpt,name:carrier,ds:ds});
        } else if(isCarHdr(cell)){
          var lastCpt=null;
          for(var pr=ri-1; pr>=Math.max(ri-6,0); pr--){
            if(ci<rows[pr].length && rows[pr][ci]){
              var ct=parseCptTime(rows[pr][ci]); if(ct){lastCpt=ct;break;}
            }
          }
          if(lastCpt){
            var carrier2=parseCarName(cell); var ds2=ri+1;
            if(ds2<rows.length){
              var hv2=rows[ds2].map(function(v){return v.toLowerCase();});
              if(hv2.indexOf('lane')!==-1||hv2.indexOf('stacking')!==-1) ds2++;
            }
            seenBlk[key]=true;
            blocks.push({ri:ri,ci:ci,cpt:lastCpt,name:carrier2,ds:ds2});
          }
        }
      }
    }
  }

  blocks.sort(function(a,b){ return a.ri===b.ri ? a.ci-b.ci : a.ri-b.ri; });

  var carriers = [];
  blocks.forEach(function(blk, bi){
    var nextRi = rows.length;
    for(var j=0; j<blocks.length; j++){
      if(j===bi) continue;
      if(blocks[j].ri > blk.ri && Math.abs(blocks[j].ci - blk.ci) <= 3)
        nextRi = Math.min(nextRi, blocks[j].ri);
    }

    var bc  = blk.ci;
    var ds  = blk.ds !== undefined ? blk.ds : blk.ri + 1;
    if(blk.ds === undefined){
      // Night shift: skip Lane/Stacking header row
      if(ds < rows.length){
        var hv=rows[ds].map(function(v){return v.toLowerCase();});
        if(hv.indexOf('lane')!==-1||hv.indexOf('stacking')!==-1) ds++;
      }
    }

    var car = {name:blk.name, cptTime:blk.cpt, rows:[]};
    for(var ri=ds; ri<nextRi; ri++){
      var row=rows[ri];
      while(row.length<=bc+4) row.push('');
      // Day shift: stop if we hit another CPT header or carrier header
      if(!isNight && row[bc] && (isCptHdr(row[bc])||isCarHdr(row[bc])||row[bc].toLowerCase()==='lane'||row[bc].toLowerCase()==='stacking')) break;
      var chute=row[bc+1];
      if(!chute||isBad(chute)) continue;
      if(!/^[A-Z0-9][A-Z0-9\-]+$/i.test(chute)||chute.length<3) continue;
      var owner=isBad(row[bc+4])?'':row[bc+4];
      if(owner.toUpperCase()==='OFF') owner='';
      car.rows.push({
        cptTime: blk.cpt,
        lane:    isBad(row[bc])   ? '' : row[bc],
        chute:   chute,
        sort:    isBad(row[bc+2]) ? '' : row[bc+2],
        bay:     isBad(row[bc+3]) ? '' : row[bc+3],
        owner:   owner
      });
    }
    if(car.rows.length) carriers.push(car);
  });

  return carriers;
}

/* ── Publish ── */
function publishAll(){
  var data = flatten();
  if(!data.length){ showStatus('Nothing to publish — import Excel first.','err'); return; }
  if(!GH_TOKEN){ showStatus('No GitHub token — save your token first.','err'); return; }

  var btn = document.getElementById('publishBtn');
  btn.disabled = true; btn.textContent = 'Publishing...';
  var times = [...new Set(data.map(function(r){return r.cpt;}))].sort();
  showStatus('Publishing ' + data.length + ' rows across ' + times.length + ' CPT times...','inf');

  var payload = JSON.stringify({ts:new Date().toLocaleString('en-GB'), data:data, sheets:sheets, rosterMap:{}});

  fetch('https://api.github.com/repos/santojef/brs1-cpt/contents/data.json',{
    headers:{'Authorization':'token '+GH_TOKEN,'Accept':'application/vnd.github.v3+json','User-Agent':'brs1-cpt'}
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    var body = {message:'Publish '+data.length+' rows — '+times.join(', '), content:btoa(unescape(encodeURIComponent(payload))), branch:'main'};
    if(d.sha) body.sha = d.sha;
    return fetch('https://api.github.com/repos/santojef/brs1-cpt/contents/data.json',{
      method:'PUT',
      headers:{'Authorization':'token '+GH_TOKEN,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json','User-Agent':'brs1-cpt'},
      body:JSON.stringify(body)
    });
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    btn.disabled=false; btn.textContent='✅ Publish to TVs';
    if(d.content){
      showStatus('✓ Published ' + data.length + ' rows — CPTs: ' + times.join(', ') + ' — TVs update in ~15s','ok');
    } else {
      showStatus('Error: '+(d.message||JSON.stringify(d).substring(0,100)),'err');
    }
  })
  .catch(function(e){ btn.disabled=false; btn.textContent='✅ Publish to TVs'; showStatus('Error: '+e.message,'err'); });
}

function showStatus(msg, cls){
  var el = document.getElementById('status');
  el.textContent = msg; el.className = 'status '+cls;
  if(cls==='ok') setTimeout(function(){ el.style.display='none'; }, 8000);
}

function saveToken(){
  var t = document.getElementById('tokenInput').value.trim();
  if(!t){ alert('Please enter a token'); return; }
  localStorage.setItem('gh_token', t);
  GH_TOKEN = t;
  document.getElementById('tokenSetup').style.display = 'none';
  showStatus('Token saved.','ok');
}

function checkToken(){
  if(!localStorage.getItem('gh_token')){
    document.getElementById('tokenSetup').style.display = 'flex';
  }
}

/* ── Load existing data on page open ── */
function loadExisting(){
  fetch(DATA_RAW+'?t='+Date.now(),{cache:'no-store'})
  .then(function(r){ return r.json(); })
  .then(function(d){
    if(d && d.sheets && d.sheets.length){
      sheets = d.sheets; activeSheet = 0; render();
      showStatus('Loaded: ' + d.ts + ' (' + (d.data||[]).length + ' rows)','inf');
    } else {
      addSheet(); render();
    }
  })
  .catch(function(){ addSheet(); render(); });
}

loadExisting();
checkToken();
</script>
</body>
</html>
